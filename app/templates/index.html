<!DOCTYPE html>
<html>
<head>
    <title>Meal Planner</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4a90d9; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .eat-out { color: #e67e22; font-weight: bold; }
        .btn { padding: 4px 10px; margin: 2px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-reroll { background-color: #3498db; }
        .btn-eatout { background-color: #e67e22; }
        .btn-confirm { background-color: #27ae60; padding: 10px 24px; font-size: 16px; margin-top: 16px; }
        .btn-regenerate { background-color: #8e44ad; padding: 10px 24px; font-size: 16px; margin-top: 16px; }
    </style>
</head>
<body>
    <h1>Meal Planner</h1>
    <table>
        <tr>
            <th>#</th>
            <th>Date</th>
            <th>Meal</th>
            <th>Who</th>
            <th>What</th>
            <th>Actions</th>
        </tr>
        {% for item in schedule %}
        <tr>
            <td>{{ item.index }}</td>
            <td>{{ item.date }}</td>
            <td>{{ item.meal_type }}</td>
            <td>{{ item.eater_name }}</td>
            <td>
                {% if item.eat_out %}
                    <span class="eat-out">Eating Out</span>
                {% else %}
                    {{ item.meal_name }}
                {% endif %}
            </td>
            <td>
                <a href="/reroll/{{ item.index }}" class="btn btn-reroll">Reroll</a>
                <a href="/eat-out/{{ item.index }}" class="btn btn-eatout">Eat Out</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/confirm" class="btn btn-confirm">Confirm & Push to Calendar</a>
    <a href="/regenerate" class="btn btn-regenerate">Regenerate Schedule</a>
</body>
</html>
